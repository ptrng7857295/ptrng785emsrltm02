name: Post Harga Emas ke Threads

on:
  schedule:
    # Jalankan setiap 10 menit
    # Catatan: GitHub Actions minimum 5 menit, bisa telat 1-3 menit
    - cron: '*/15 * * * *'

  # Tombol manual — bisa trigger dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  post-emas:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      # ── 1. Ambil kode dari repo ─────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Setup Python ────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install library ─────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Jalankan pipeline ───────────────────────────────
      - name: Fetch → Generate → Post
        env:
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GOLD_API_KEY:         ${{ secrets.GOLD_API_KEY }}
          EXCHANGE_API_KEY:     ${{ secrets.EXCHANGE_API_KEY }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
        run: python main.py

      # ── 5. Simpan gambar sebagai artifact (opsional) ───────
      # Bisa dilihat di tab Actions → Run → Artifacts
      - name: Upload gambar output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-image-${{ github.run_number }}
          path: output/latest.png
          retention-days: 1
